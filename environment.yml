name: lab-tracker
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10,<3.13
  - pip>=23.0
  # Core dependencies available via conda
  - django>=4.2,<5.0
  - djangorestframework>=3.14,<4.0
  # Development tools
  - pytest>=7.0
  - pytest-cov>=4.0
  - ruff>=0.1.0
  - mypy>=1.0
  # pip dependencies (not available in conda or need specific versions)
  - pip:
      - django-filter>=23.0,<24.0
      - pytest-django>=4.5
      - django-stubs>=4.2
      - djangorestframework-stubs>=3.14
