[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lab-tracker"
version = "0.1.0"
description = "Lab tracker project"
requires-python = ">=3.10"

[project.optional-dependencies]
test = [
  "pytest",
]

[tool.setuptools]
package-dir = {"" = "src"}
packages = ["lab_tracker"]

[tool.codex_orchestrator]
env = "lab_tracker"
allow_env_creation = true
