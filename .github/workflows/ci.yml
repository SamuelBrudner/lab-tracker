name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
      - name: Create venv
        run: uv venv
      - name: Install dependencies
        run: uv pip install -e ".[test,lint]"
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q
